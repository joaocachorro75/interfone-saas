# Interfone SaaS - Multi-Tenant PBX com WebRTC
# Morador usa navegador (WebRTC) <-> Asterisk (SIP via WebSocket)

version: '3.8'

services:
  # ============================================
  # INFRAESTRUTURA COMPARTILHADA
  # ============================================
  
  nginx:
    image: nginx:alpine
    container_name: interfone-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8089:8089"  # WebRTC WebSocket
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - interfone-net

  database:
    image: mysql:8.0
    container_name: interfone-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-RootInterfone2024}
      MYSQL_DATABASE: interfone_saas
      MYSQL_USER: saas_user
      MYSQL_PASSWORD: ${DB_PASS:-SaasPass2024}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    ports:
      - "3306:3306"
    networks:
      - interfone-net

  redis:
    image: redis:7-alpine
    container_name: interfone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - interfone-net

  # ============================================
  # API CENTRAL
  # ============================================
  api:
    build: ./api
    container_name: interfone-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: interfone_saas
      DB_USER: saas_user
      DB_PASS: ${DB_PASS:-SaasPass2024}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-InterfoneSuperSecretKey2024}
      FREEPBX_AMI_HOST: freepbx-master
      FREEPBX_AMI_PORT: 5038
      FREEPBX_AMI_USER: admin
      FREEPBX_AMI_PASS: ${AMI_PASS:-AdminAmi2024}
      WEBRTC_ENABLED: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - instances_data:/var/lib/interfone/instances
      - ./api:/app
    ports:
      - "3000:3000"
    depends_on:
      - database
      - redis
    networks:
      - interfone-net

  # ============================================
  # PAINEL WEB COM SOFTPHONE INTEGRADO (WEBRTC)
  # ============================================
  painel:
    build: ./painel
    container_name: interfone-painel
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=/api
      - REACT_APP_WEBRTC_WS=wss://${DOMAIN:-localhost}:8089/ws
      - REACT_APP_SIP_DOMAIN=${DOMAIN:-localhost}
      - REACT_APP_SIP_PORT=5060
      - REACT_APP_WEBRTC_PORT=8089
    ports:
      - "8080:80"
    depends_on:
      - api
      - freepbx-master
    networks:
      - interfone-net

  # ============================================
  # FREEPBX MASTER (Template + API de gerenciamento)
  # ============================================
  freepbx-master:
    image: tiredofit/freepbx:16-18-latest
    container_name: freepbx-template
    restart: unless-stopped
    privileged: true  # Necessário para SIP
    environment:
      # Admin
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${FREEPBX_PASS:-FreePBX2024}
      
      # Banco
      DB_EMBEDDED: "FALSE"
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: asterisk_template
      DB_USER: saas_user
      DB_PASS: ${DB_PASS:-SaasPass2024}
      
      # SIP/PJSIP
      RTP_START: 10000
      RTP_END: 10100
      
      # WebRTC
      ENABLE_WEBRTC: "TRUE"
      WEBRTC_PORT: 8089
      
      # AMI
      AMI_ENABLED: "TRUE"
      AMI_PORT: 5038
      AMI_BINDADDR: 0.0.0.0
      
      # SSL (opcional - usar nginx reverse proxy)
      ENABLE_SSL: "FALSE"
      
    volumes:
      - freepbx_template_config:/etc/asterisk
      - freepbx_template_data:/data
      - ./freepbx/scripts:/scripts:ro
    ports:
      # Portas internas (não exponha externamente sem firewall)
      - "127.0.0.1:8081:80"     # HTTP (acesso local)
      - "127.0.0.1:5038:5038"   # AMI Manager
      - "5060:5060/udp"         # SIP UDP
      - "5060:5060/tcp"         # SIP TCP
      - "10000-10100:10000-10100/udp"  # RTP
      - "127.0.0.1:8089:8089"   # WebRTC WebSocket
    networks:
      interfone-net:
        ipv4_address: 172.20.0.10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5

  # ============================================
  # TURN/STUN Server (para WebRTC NAT traversal)
  # ============================================
  coturn:
    image: coturn/coturn:latest
    container_name: interfone-turn
    restart: unless-stopped
    environment:
      - DETECT_EXTERNAL_IP=yes
      - EXTERNAL_IP=${EXTERNAL_IP:-auto}
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-65535:49152-65535/udp"  # TURN relay
    networks:
      - interfone-net

  # ============================================
  # PROVISIONADOR - Cria instâncias FreePBX dinâmicas
  # ============================================
  provisionador:
    build: ./provisionador
    container_name: interfone-provisionador
    restart: unless-stopped
    environment:
      - API_URL=http://api:3000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-WebhookSecret2024}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./freepbx/templates:/templates:ro
      - instances_data:/var/lib/interfone/instances
    depends_on:
      - api
    networks:
      - interfone-net

volumes:
  db_data:
  redis_data:
  instances_data:
  freepbx_template_config:
  freepbx_template_data:
  letsencrypt:

networks:
  interfone-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
